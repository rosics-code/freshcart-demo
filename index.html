<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="/img/icon.png"><h1>FreshCart</h1></img>
    <div class="cart-status">
      Cart: <span id="cart-count">0</span> items
    </div>
  </header>

  <main>
    <h2>Today's Produce</h2>
    <ul class="product-list">
      <li class="product">
        <span class="product-name">Apple</span>
        <span class="product-price">$2.00</span>
        <button class="add-btn" data-product="apple">Add to Cart</button>
      </li>
      <li class="product">
        <span class="product-name">Bread</span>
        <span class="product-price">$4.00</span>
        <button class="add-btn" data-product="bread">Add to Cart</button>
      </li>
      <li class="product">
        <span class="product-name">Milk</span>
        <span class="product-price">$3.50</span>
        <button class="add-btn" data-product="milk">Add to Cart</button>
      </li>
    </ul>
  </main>

  <!-- TODO: Add to Cart logic goes here. Students will wire this up in Phase 3. -->
  <script>
    // The cart array and click handlers will be added by students.
  </script>
</body>
</html>
